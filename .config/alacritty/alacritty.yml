window:
  padding:
    x: 40
    y: 40
  dynamic_padding: true
  decorations: none

font:
  size: 20
  normal:
    family: TerminessTTF Nerd Font
    style: Medium
  bold:
    family: TerminessTTF Nerd Font
    style: Bold
  italic:
    family: TerminessTTF Nerd Font
    style: Italic
  bold_italic:
    family: TerminessTTF Nerd Font
    style: Bold Italic
  # normal:
  #   family: Hermit
  #   style: Regular
  # bold:
  #   family: Hermit
  #   style: Bold
  # italic:
  #   family: Hermit
  #   style: RegularItalic
  # bold_italic:
  #   family: Hermit
  #   style: BoldItalic
  # normal:
  #   family: VecTerminus16
  #   style: Medium
  # bold:
  #   family: VecTerminus16
  #   style: Bold
  # italic:
  #   family: VecTerminus16
  #   style: Medium
  # bold_italic:
  #   family: VecTerminus16
  #   style: Bold

  offset:
    x: -1
    y: 0

  glyph_offset:
    x: 0
    y: 0

bell:
  animation: EaseOutExpo
  duration: 0
  color: '0xffffff'

cursor:
  style: Block
  unfocused_hollow: true

alt_send_esc: false

mouse:
  hide_when_typing: false
  url:
    launcher: firefox

key_bindings:
  - { key: Equals,   mods: Control,               action: IncreaseFontSize}
  - { key: Key0,    mods: Control,               action: DecreaseFontSize}

# BEGIN ACE
background_opacity: 0.95
colors:
  primary:
    background: '0x000000'
    foreground: '0xffffff'
  cursor:
    text:       '0x000000'
    cursor:     '0xffffff'
  normal:
    black:      '0x000000'
    red:        '0x9A2E2E'
    green:      '0xD75F00'
    yellow:     '0xE48720'
    blue:       '0xF2AF3F'
    magenta:    '0xFFD75F'
    cyan:       '0xFFE494'
    white:      '0xffffff'
  bright:
    black:      '0x513939'
    red:        '0x9A2E2E'
    green:      '0xD75F00'
    yellow:     '0xE48720'
    blue:       '0xF2AF3F'
    magenta:    '0xFFD75F'
    cyan:       '0xFFE494'
    white:      '0x1D0000' 
# END ACE
